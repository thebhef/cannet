syntax = "proto3";

package cannet.v1;

// CAN frame transport between cannet clients and servers.
//
// Three RPCs: `ListInterfaces` for an on-demand snapshot of the
// interfaces a server provides, `WatchInterfaces` for a long-lived
// subscription to changes in that set, and `Session` for a single
// bidirectional Envelope stream. Frame movement is symmetric — either
// side sends frames on a subscribed interface using the same wire
// shape.
//
// Cyclic / scheduled emission is not modelled at the wire layer.
// Sending on a cadence is a feature of the client transmit UI.
//
// Discovery: see ADR 0016. `ListInterfaces` and `WatchInterfaces`
// are deliberately redundant in the steady state — pull vs. push of
// the same underlying server-side cache. The server owns the polling
// cadence and the change-detection rule; clients either ask once or
// subscribe.
service CannetServer {
  // Stateless query: what CAN interfaces does this server expose?
  rpc ListInterfaces(ListInterfacesRequest) returns (InterfaceList);

  // Long-lived subscription: emits a snapshot on subscribe, then a
  // fresh snapshot every time the server's view of its interfaces
  // changes. The server decides when its view changed; the client
  // just receives. Closing the stream ends the subscription.
  rpc WatchInterfaces(WatchInterfacesRequest) returns (stream InterfaceList);

  // A single bidirectional stream of Envelopes for the lifetime of a
  // client session. Closing the stream ends the session.
  rpc Session(stream Envelope) returns (stream Envelope);
}

message ListInterfacesRequest {}

message WatchInterfacesRequest {}

message InterfaceList {
  repeated Interface interfaces = 1;
}

message Interface {
  // Stable, human-readable identifier. Persistable to project files.
  string id = 1;
  // Display label for UI rendering.
  string display_name = 2;
  // Whether this interface accepts CAN FD frames.
  bool fd_capable = 3;
}

// A multiplexed message exchanged on the Session stream. Either peer
// may send any variant; envelope direction is by convention
// (see ADR 0021 § Wire-protocol additions for the virtual-bus
// envelopes).
message Envelope {
  oneof body {
    Subscribe subscribe = 1;
    Unsubscribe unsubscribe = 2;
    FrameBatch frame_batch = 3;
    Error error = 4;
    // Out-of-band structured log message (ADR 0014) — distinct from
    // Error (Error still ends the session). The host bridges these
    // into its local log bus; vendor sidecars consume them.
    LogMessage log = 5;

    // ---- Virtual-bus additions (ADR 0021) ----

    // client → server. Set / change the bus configuration of the
    // named interface. Applied to a virtual-bus factory it
    // reconfigures the bus; applied to a bridge or physical
    // interface it reconfigures the underlying controller.
    ConfigureBus configure_bus = 6;
    // server → client. Returned in response to a Subscribe against
    // a virtual-bus factory: tells the client which allocated
    // participant id was created for it.
    InterfaceAllocated interface_allocated = 7;
    // server → client. Controller fault-confinement state change
    // (Active / Passive / Bus-off transitions per ISO 11898-1, plus
    // TEC/REC), delivered by a hardware server to its subscribers.
    InterfaceState interface_state = 8;
    // client → server. Install a bridge from the named local
    // interface to a remote (address, interface_id) endpoint.
    AttachBridge attach_bridge = 10;
    // client → server. Tear down a previously installed bridge by
    // name.
    DetachBridge detach_bridge = 11;
  }
}

message Subscribe {
  string interface_id = 1;
}

message Unsubscribe {
  string interface_id = 1;
}

// A batch of CAN frames originating on a single interface.
//
// FrameBatch is the only frame-carrying envelope variant — single
// frames travel as a batch of size one. The batching policy (max
// frames per batch, max latency) is a sender-side concern; the
// receiver simply unbatches.
message FrameBatch {
  string interface_id = 1;
  repeated Frame frames = 2;
}

message Frame {
  // Sender's monotonic timestamp in nanoseconds.
  uint64 timestamp_ns = 1;
  // CAN identifier (raw bits).
  uint32 can_id = 2;
  // True for 29-bit extended ids; false for 11-bit standard.
  bool extended = 3;
  // Whether this frame originated from the bus (Rx) or was emitted
  // by the sender (Tx, including tx-confirms).
  Direction direction = 4;
  FrameKind kind = 5;
  // Payload bytes. Empty for Remote and Error kinds. Length implies
  // DLC for Classic and Fd kinds.
  bytes data = 6;
  // CAN FD: bit-rate-switch flag. Ignored for non-FD kinds.
  bool brs = 7;
  // CAN FD: error-state-indicator flag. Ignored for non-FD kinds.
  bool esi = 8;
  // Remote: requested DLC (0..=15). Ignored for non-Remote kinds.
  uint32 dlc = 9;
}

enum Direction {
  DIRECTION_UNSPECIFIED = 0;
  DIRECTION_RX = 1;
  DIRECTION_TX = 2;
}

enum FrameKind {
  FRAME_KIND_UNSPECIFIED = 0;
  FRAME_KIND_CLASSIC = 1;
  FRAME_KIND_FD = 2;
  FRAME_KIND_REMOTE = 3;
  FRAME_KIND_ERROR = 4;
}

// Out-of-band structured log message (ADR 0014) reported by either
// peer on the Session stream. Distinct from Error — Error still ends
// the session; a LogMessage is informational / advisory and the
// session continues normally. The host bridges incoming wire log
// messages into its local System Messages bus.
message LogMessage {
  // Sender's monotonic timestamp in nanoseconds. The receiver maps
  // this to its own clock for display.
  uint64 timestamp_ns = 1;
  LogLevel level = 2;
  // Short stable source tag. Wire convention: vendor sidecars send
  // their tag prefixed with "sidecar:" (e.g. "sidecar:peak"); a server
  // can pick any short identifier.
  string source = 3;
  // Human-readable message body.
  string message = 4;
}

enum LogLevel {
  LOG_LEVEL_UNSPECIFIED = 0;
  LOG_LEVEL_INFO = 1;
  LOG_LEVEL_WARN = 2;
  LOG_LEVEL_ERROR = 3;
}

// Out-of-band error reported by either peer on the Session stream.
message Error {
  Code code = 1;
  // Human-readable detail. Optional.
  string message = 2;

  enum Code {
    CODE_UNSPECIFIED = 0;
    // The interface_id named by Subscribe / Unsubscribe / FrameBatch
    // is not exposed by this server.
    CODE_UNKNOWN_INTERFACE = 1;
    // A FrameBatch arrived for an interface this peer has not
    // subscribed to.
    CODE_NOT_SUBSCRIBED = 2;
    // A transmit was rejected — read-only source, bus-off, etc.
    CODE_TX_REJECTED = 3;
    // Server already has a connected client (single-client server
    // restriction).
    CODE_BUSY = 4;
    // A transmit on a virtual-bus participant reached zero recipients
    // (no other subscriber acknowledged the frame). See ADR 0021.
    CODE_NO_ACKNOWLEDGER = 5;
  }
}

// Bus configuration set/change envelope (ADR 0021). Applies to a
// virtual-bus factory, a bridge id, or a physical interface id; the
// addressed server routes accordingly.
message ConfigureBus {
  // Which interface the configuration applies to. May be a
  // virtual-bus factory id (reconfigures the bus), a bridge id
  // (reconfigures the underlying controller), or a physical
  // interface id (reconfigures the controller).
  string interface_id = 1;
  // Arbitration-phase bit rate, in bits per second.
  uint64 speed_bps = 2;
  // Data-phase bit rate for CAN FD frames with BRS set, in bits per
  // second. 0 means "unset" (classic-only buses).
  uint64 fd_data_speed_bps = 3;
  // Whether the interface accepts CAN FD frames.
  bool fd_enabled = 4;
}

// Server's response to a Subscribe against a virtual-bus factory: the
// freshly allocated participant id (ADR 0021).
message InterfaceAllocated {
  string interface_id = 1;
}

// Bridge controller-state change. Pushed by the server to every
// session subscribed to the bridge id; mirrors the underlying
// controller's ISO 11898-1 fault-confinement state.
message InterfaceState {
  string interface_id = 1;
  ControllerState state = 2;
  // ISO 11898-1 Transmit Error Counter.
  uint32 tec = 3;
  // ISO 11898-1 Receive Error Counter.
  uint32 rec = 4;
}

enum ControllerState {
  CONTROLLER_STATE_UNSPECIFIED = 0;
  CONTROLLER_STATE_ACTIVE = 1;
  CONTROLLER_STATE_PASSIVE = 2;
  CONTROLLER_STATE_BUS_OFF = 3;
}

// Install a bridge whose RX feeds from, and TX forwards to, an
// interface on a remote wire endpoint (ADR 0021). `name` is an
// optional stable label used by `DetachBridge` and to derive the
// bridge's listed interface id; if empty the server picks one.
message AttachBridge {
  string remote_address = 1;
  string interface_id = 2;
  string name = 3;
}

// Tear down a previously installed bridge by name (ADR 0021).
message DetachBridge {
  string name = 1;
}
